<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form action="" method="post">
        <fieldset>
            <legend>Crie sua conta</legend>

            <label for="user-name">Nome:</label><br>
            <input type="text" name="user-name" id="user-name"><br><br>

            <label for="e-mail">E-Mail</label><br>
            <input type="email" name="e-mail" id="e-mail"><br><br>

            <label for="password">Senha (mínimo 8 carateres):</label><br>
            <input type="password" name="password" id="password" minlength="8"><br>

            <br>

            <label for="gender">Gênero:<br>
            <input type="radio" name="gender" id="radio" value="Femino">Feminino</input><br>
            <input type="radio" name="gender" id="masculino" value="Masculino">Masculino</input><br>
            <input type="radio" name="gender" id="outro" value="Outro">Outro</input><br>
            </label>

            <br>

            <label for="biograph">Biografia:</label><br>
            <textarea name="biograph" id="biograph" rows="6" placeholder="Fale um pouco sobre você..."></textarea><br>

            <input required type="checkbox" name="checkbox" id="checkbox">
            <label>Eu li e aceito os termos de serviço</label>
        </fieldset>
        <br>
        <input type="submit" value="Cadastrar"> <input type="reset" value="Limpar">
    </form>
    
</body>
</html>
