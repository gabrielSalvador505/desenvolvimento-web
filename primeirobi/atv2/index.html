<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form action="http://localhost:3000/enviar" method="post">
        <fieldset>
            <legend>Crie sua conta</legend>

            <label for="username">Nome:</label>
            <input type="text" name="username" id="user-name" class="text-input">

            <label for="email">E-Mail</label>
            <input type="email" name="email" id="e-mail" class="text-input">

            <label for="password">Senha (mínimo 8 carateres):</label>
            <input type="password" name="password" id="password" minlength="8" class="text-input">

            <label for="gender">Gênero:
            <input type="radio" name="gender" id="radio" value="Femino">Feminino</input>
            <input type="radio" name="gender" id="masculino" value="Masculino">Masculino</input>
            <input type="radio" name="gender" id="outro" value="Outro">Outro</input>
            </label>

            <label for="biograph">Biografia:</label>
            <textarea name="biograph" id="biograph" rows="6" placeholder="Fale um pouco sobre você..."></textarea>

            <input required type="checkbox" name="checkbox" id="checkbox">
            <label for="checkbox">Eu li e aceito os termos de serviço</label>

            <input type="submit" value="Cadastrar"> 
            <input type="reset" value="Limpar">

        </fieldset>
    </form>
</body>
</html>
